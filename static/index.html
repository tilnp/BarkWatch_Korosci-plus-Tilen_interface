<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BarkWatch Slovenija</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <aside class="left-panel">
        <div class="panel-header">
            <h1>BarkWatch Slovenija</h1>
            <p class="panel-subtitle">Iskanje in podatki o gozdnih odsekih</p>
        </div>

        <div class="search-block">
            <label for="ggo-select">Izberi Gozdnogospodarsko območje</label>
            <select id="ggo-select">
                <option value="">-- izberi GGO --</option>
            </select>

            <label for="odsek-search">Išči po odsek ID</label>
            <div class="search-row">
                <input id="odsek-search" type="text" placeholder="Najprej izberi GGO" autocomplete="off" disabled>
                <button id="search-btn" type="button" disabled>Poišči</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div class="info-block">
            <h2>Podatki odseka</h2>
            <div id="selected-odsek" class="selected-odsek">Ni izbranega odseka.</div>
            <div id="odsek-details" class="odsek-details empty">
                Izberi odsek na karti ali preko iskalnika.
            </div>
        </div>
    </aside>

    <main class="map-area">
        <div id="map"></div>

        <div class="time-slider-overlay">
            <div class="time-slider-title">Časovno obdobje (36 mesecev: 24 podatki + 12 napoved)</div>
            <div class="time-slider-row">
                <input id="month-slider" type="range" min="1" max="36" step="1" value="1">
                <span id="month-label">Mesec 1</span>
            </div>
        </div>
    </main>
</div>

<script src="/app.js"></script>
</body>
</html>
